services:
  agent-bridge:
    build: .
    container_name: agent-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_BRIDGE_CLAUDE_WORK_DIR=/workspace
      - AGENT_BRIDGE_SESSION_STORE_PATH=/app/data/sessions.json
    volumes:
      # Mount your project directory for Claude Code to operate on
      - ${AGENT_BRIDGE_CLAUDE_WORK_DIR:-.}:/workspace
      # Persist session data across restarts
      - agent-bridge-data:/app/data
      # Mount host Claude auth (so you don't need ANTHROPIC_API_KEY)
      # Comment this out if using ANTHROPIC_API_KEY instead
      - ~/.claude:/root/.claude:ro

volumes:
  agent-bridge-data:
